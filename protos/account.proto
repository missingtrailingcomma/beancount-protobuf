syntax = "proto3";

package protos;

import "google/protobuf/timestamp.proto";

message Account {
  string id = 1;
  string display_name = 2;
  google.protobuf.Timestamp open_timestamp = 3;
  google.protobuf.Timestamp close_timestamp = 4;
  repeated string currencies = 5;

  string account_switch_to = 6;
}
